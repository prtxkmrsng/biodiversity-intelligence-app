name: Android APK Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# FIX 2: This silences the Node 20 deprecation warning by opting into the new runner
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-compile:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          # FIX 1: This tells GitHub to find the lockfile wherever it is
          cache-dependency-path: '**/package-lock.json' 

      - name: Install Dependencies
        working-directory: ./expo-mobile-export
        run: npm install

      - name: Run ESLint
        working-directory: ./expo-mobile-export
        run: npm run lint

      # --- START NATIVE ANDROID BUILD PROCESS ---
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prebuild Native Android Code
        working-directory: ./expo-mobile-export
        run: npx expo prebuild --platform android --clean

      - name: Compile APK via Gradle
        working-directory: ./expo-mobile-export/android
        run: ./gradlew assembleRelease

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Darukaa-Biodiversity-App
          path: ./expo-mobile-export/android/app/build/outputs/apk/release/app-release.apk
